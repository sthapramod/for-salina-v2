<div class="container">

<h1>💕 A Few Questions Just For You 💕</h1>

<form action="https://formspree.io/f/mvzeoajn" method="POST">

<label>❤️ Your Name</label>
<input type="text" name="Name" required>

<label>🥰 What was your first impression of me?</label>
<textarea name="First Impression" required></textarea>

<label>💕 When did you realize you liked me?</label>
<textarea name="Realized"></textarea>

<label>🌹 What's your favorite memory with me?</label>
<textarea name="Memory"></textarea>

<label>😊 What's your favorite thing about me?</label>
<textarea name="Favorite Thing"></textarea>

<label>😂 What's the funniest moment we've shared?</label>
<textarea name="Funny Moment"></textarea>

<label>🎵 Which song reminds you of us?</label>
<input type="text" name="Song">

<label>🍕 What's your favorite food to eat with me?</label>
<input type="text" name="Food">

<label>🌍 Where should we travel together?</label>
<input type="text" name="Travel">

<label>🌙 Describe your dream date with me.</label>
<textarea name="Dream Date"></textarea>

<label>📸 Which place do you want to visit with me?</label>
<input type="text" name="Favorite Place">

<label>🎁 What's the sweetest gift you give to me?</label>
<input type="text" name="Gift">

<label>❤️ Describe me in three words.</label>
<input type="text" name="Three Words">

<label>💖 What's one thing I do that always makes you smile?</label>
<textarea name="Smile"></textarea>

<label>🥹 What do you miss most about me?</label>
<textarea name="Miss"></textarea>

<label>🌸 What's something you'd like us to do together?</label>
<textarea name="Future"></textarea>

<label>💌 Write a short letter to me.</label>
<textarea name=" Letter" rows="6"></textarea>

<label>❤️ How much do you know me?</label>
<input type="range" min="1" max="100" value="100" name="Love Meter">

<label>💍 Would you like to grow old with me?</label>
<select name="Forever">
<option>❤️ Yes</option>
<option>🥰 Of Course</option>
<option>💕 Forever</option>
</select>

<label>🌹 One promise you'll always keep?</label>
<textarea name="Promise"></textarea>

<label>💖 Any final message for me?</label>
<textarea name="Final Message" rows="5"></textarea>

<br><br>

<button type="submit">❤️ Send My Answers ❤️</button>

</form>
