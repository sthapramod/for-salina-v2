<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Gallery ❤️</title>

<link rel="stylesheet" href="style.css">

<style>

.gallery-container{
max-width:1200px;
margin:40px auto;
padding:20px;
}

.gallery-title{
text-align:center;
font-size:40px;
margin-bottom:10px;
color:#ff2d75;
}

.gallery-sub{
text-align:center;
font-size:18px;
margin-bottom:40px;
color:#666;
}

.gallery{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;

}

.gallery img{

width:100%;
height:350px;
object-fit:cover;
border-radius:20px;
cursor:pointer;
transition:.4s;
box-shadow:0 10px 25px rgba(0,0,0,.2);

}

.gallery img:hover{

transform:scale(1.05);

}

#popup{

display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
z-index:9999;

}

#popup img{

max-width:90%;
max-height:90%;
border-radius:20px;

}

#close{

position:absolute;
top:20px;
right:30px;
font-size:45px;
color:white;
cursor:pointer;

}

</style>

</head>

<body>

<nav>

<div class="logo">❤️ For Salina</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">

<a href="home.html">🏠 Home</a>
<a href="letter.html">💌 Letter</a>
<a href="gallery.html">📸 Gallery</a>
<a href="questions.html">💕 Questions</a>
<a href="date.html">💖 Date</a>
<a href="video.html">🎥 Videos</a>
<a href="music.html">🎵 Music</a>
<a href="secret.html">🔒 Secret</a>
<a href="surprise.html">🎁 Surprise</a>

</div>

</nav>

<div class="gallery-container">

<h1 class="gallery-title">📸 Our Beautiful Memories ❤️</h1>

<p class="gallery-sub">
Every picture tells a beautiful story of us. 💕
</p>

<div class="gallery">

<img src="photo1.png" onclick="openPhoto(this.src)">
<img src="photo2.png" onclick="openPhoto(this.src)">
<img src="photo3.png" onclick="openPhoto(this.src)">
<img src="photo4.png" onclick="openPhoto(this.src)">
<img src="photo5.png" onclick="openPhoto(this.src)">
<img src="photo6.jpg" onclick="openPhoto(this.src)">

</div>

</div>

<div id="popup">

<span id="close" onclick="closePhoto()">&times;</span>

<img id="popupImg">

</div>

<script>

window.toggleMenu=function(){

document.getElementById("menu").classList.toggle("show");

}

function openPhoto(src){

document.getElementById("popup").style.display="flex";
document.getElementById("popupImg").src=src;

}

function closePhoto(){

document.getElementById("popup").style.display="none";

}

</script>

</body>

</html>
