<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Videos ❤️</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
background:black;
font-family:Arial,sans-serif;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.video-box{
height:100vh;
width:100%;
position:relative;
scroll-snap-align:start;
display:flex;
justify-content:center;
align-items:center;
}

.video-box video{
width:100%;
height:100%;
object-fit:cover;
}

.caption{
position:absolute;
bottom:80px;
left:20px;
color:white;
font-size:25px;
font-weight:bold;
text-shadow:2px 2px 10px black;
}

.top-bar{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
z-index:1000;
}

.top-bar a{
text-decoration:none;
color:white;
background:#ff2d75;
padding:10px 20px;
border-radius:30px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="top-bar">
<a href="home.html">🏠 Home</a>
</div>

<div class="video-box">

<video controls autoplay muted loop>
<source src="video1.mp4" type="video/mp4">
</video>

<div class="caption">
❤️ Our First Memory
</div>

</div>

<div class="video-box">

<video controls muted loop>
<source src="video2.mp4" type="video/mp4">
</video>

<div class="caption">
🥰 Every Moment With You
</div>

</div>

<div class="video-box">

<video controls muted loop>
<source src="video3.mp4" type="video/mp4">
</video>

<div class="caption">
💕 Forever Together
</div>

</div>

</body>
</html>
